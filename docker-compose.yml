services:
  dashboard:
    build: .
    container_name: botcoin-dashboard
    restart: unless-stopped
    ports:
      - "80:8080"
    volumes:
      - ./VERSION:/app/VERSION:ro
      - ./data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
